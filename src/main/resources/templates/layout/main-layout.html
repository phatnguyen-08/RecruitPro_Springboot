<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$LAYOUT_TITLE - $CONTENT_TITLE">J2PP - Job Portal</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link th:href="@{/css/main.css}" rel="stylesheet">
    <th:block layout:fragment="styles"></th:block>
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">
                <i class="fas fa-rocket me-2 text-primary"></i>J2PP
            </a>
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">
                            <i class="fas fa-briefcase me-1"></i>Việc làm
                        </a>
                    </li>

                    <!-- Recruiter menu - Hidden by default, shown by JS -->
                    <li class="nav-item dropdown hidden" id="nav-recruiter-menu">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="fas fa-building me-1"></i>Nhà tuyển dụng
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" th:href="@{/recruiter/jobs}"><i class="fas fa-list me-2"></i>Quản lý tin đăng</a></li>
                            <li><a class="dropdown-item" th:href="@{/recruiter/jobs/create}"><i class="fas fa-plus me-2"></i>Đăng tin mới</a></li>
                            <li><a class="dropdown-item" th:href="@{/recruiter/company}"><i class="fas fa-building me-2"></i>Thông tin công ty</a></li>
                        </ul>
                    </li>

                    <!-- Candidate menu - Hidden by default, shown by JS -->
                    <li class="nav-item hidden" id="nav-candidate-menu">
                        <a class="nav-link" th:href="@{/candidate/applications}">
                            <i class="fas fa-file-alt me-1"></i>Việc làm đã ứng tuyển
                        </a>
                    </li>
                </ul>

                <div class="d-flex align-items-center gap-2">
                    <!-- Auth Buttons - Shown/Hidden by JS -->
                    <a th:href="@{/login}" class="btn btn-outline-primary" id="nav-login-btn">Đăng nhập</a>
                    <a th:href="@{/register}" class="btn btn-primary" id="nav-register-btn">Đăng ký</a>

                    <!-- User Info Dropdown - Hidden by default, shown by JS -->
                    <div class="dropdown hidden" id="nav-user-dropdown">
                        <button class="btn btn-light dropdown-toggle d-flex align-items-center" type="button" data-bs-toggle="dropdown">
                            <i class="fas fa-user-circle me-2 fs-5"></i>
                            <span id="nav-username">User</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0 mt-2">
                            <li>
                                <a class="dropdown-item" th:href="@{/candidate/profile}">
                                    <i class="fas fa-id-card me-2"></i>Hồ sơ cá nhân
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <a class="dropdown-item text-danger" href="javascript:void(0)" onclick="logout()">
                                    <i class="fas fa-sign-out-alt me-2"></i>Đăng xuất
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main layout:fragment="content" class="flex-grow-1 py-4">
    </main>

    <!-- Footer -->
    <footer class="py-4 bg-dark text-white mt-auto">
        <div class="container text-center">
            <span class="text-muted small">© 2026 J2PP Job Portal. Đã đăng nhập với JWT.</span>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/main.js}"></script>
    <th:block layout:fragment="scripts"></th:block>

</body>
</html>
