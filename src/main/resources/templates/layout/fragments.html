<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Notification Modal Fragment -->
<div th:fragment="notificationModal" class="modal fade" id="notificationModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="notificationTitle">
                    <i class="fas fa-bell me-2 text-primary"></i>Thông báo
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="notificationMessage">
                <!-- Message will be injected here -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Đóng</button>
            </div>
        </div>
    </div>
</div>

<!-- Job Card Fragment -->
<div th:fragment="jobCard(job)" class="col-md-6 col-lg-4">
    <div class="card job-card h-100 border-0">
        <div class="card-body">
            <!-- Header with company logo and job type -->
            <div class="d-flex justify-content-between align-items-start mb-3">
                <div class="company-logo" th:text="${#strings.substring(job.companyName, 0, 1)}">C</div>
                <span class="badge" th:classappend="${job.jobType == 'Toàn thời gian' ? 'badge-fulltime' : (job.jobType == 'Bán thời gian' ? 'badge-parttime' : (job.jobType == 'Remote' ? 'badge-remote' : 'badge-intern'))}" th:text="${job.jobType}">Toàn thời gian</span>
            </div>

            <!-- Job title and company -->
            <h5 class="card-title fw-bold mb-1" th:text="${job.title}">Senior Java Developer</h5>
            <h6 class="text-muted mb-3" th:text="${job.companyName}">Google Vietnam</h6>

            <!-- Job meta info -->
            <div class="mb-3">
                <div class="d-flex align-items-center text-muted mb-2">
                    <i class="fas fa-map-marker-alt me-2 text-primary"></i>
                    <small th:text="${job.location}">TP. Hồ Chí Minh</small>
                </div>
                <div class="d-flex align-items-center text-muted">
                    <i class="fas fa-money-bill-wave me-2 text-primary"></i>
                    <small th:text="${job.salaryRange != null && job.salaryRange != '' ? job.salaryRange : 'Thỏa thuận'}">Thỏa thuận</small>
                </div>
            </div>

            <!-- Description -->
            <p class="card-text text-muted text-truncate-2 small mb-0" th:text="${job.description}">Mô tả ngắn gọn về công việc và yêu cầu...</p>
        </div>
        <div class="card-footer bg-transparent border-0 pt-0">
            <div class="d-flex gap-2">
                <a th:href="@{'/jobs/' + ${job.id}}" class="btn btn-outline-primary flex-grow-1">
                    <i class="fas fa-eye me-2"></i>Chi tiết
                </a>
                <button class="btn btn-primary flex-grow-1" th:attr="onclick='applyForJob(' + ${job.id} + ')'">
                    <i class="fas fa-paper-plane me-2"></i>Ứng tuyển
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Empty State Fragment -->
<div th:fragment="emptyState(icon, title, message)" class="col-12 text-center py-5">
    <div class="card border-0 p-5">
        <div class="mb-4">
            <i th:class="'fas fa-' + ${icon} + ' fa-4x text-muted opacity-50'"></i>
        </div>
        <h4 class="text-muted mb-2" th:text="${title}">Không có dữ liệu</h4>
        <p class="text-muted mb-0" th:text="${message}">Không có thông tin để hiển thị.</p>
    </div>
</div>

<!-- Loading State Fragment -->
<div th:fragment="loadingState(message)" class="col-12 text-center py-5">
    <div class="loading-state">
        <p class="text-muted mb-0" th:text="${message}">Đang tải...</p>
    </div>
</div>

</body>
</html>
