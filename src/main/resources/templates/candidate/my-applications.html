<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Việc làm đã ứng tuyển</title>
</head>
<body>
<div layout:fragment="content" class="py-5">
    <h2 class="fw-bold mb-4">Lịch sử ứng tuyển</h2>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4">Tên công việc</th>
                            <th>Công ty</th>
                            <th>Ngày ứng tuyển</th>
                            <th>Trạng thái</th>
                            <th class="text-center pe-4">Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <th:block th:if="${applications != null and !applications.empty}">
                            <tr th:each="app : ${applications}">
                                <td class="ps-4">
                                    <h6 class="mb-0 fw-bold" th:text="${app.jobTitle}">Senior Java Developer</h6>
                                </td>
                                <td th:text="${app.companyName}">Google Vietnam</td>
                                <!-- ✅ Sửa appliedDate → appliedAt -->
                                <td th:text="${#temporals.format(app.appliedAt, 'dd/MM/yyyy')}">20/03/2026</td>
                                <td>
                                    <!-- ✅ Sửa status đúng với enum ApplicationStatus -->
                                    <span class="badge"
                                          th:classappend="${app.status.name() == 'APPLIED'} ? 'bg-warning text-dark' :
                                                         (${app.status.name() == 'SHORTLISTED'} ? 'bg-info' :
                                                         (${app.status.name() == 'INTERVIEWING'} ? 'bg-primary' :
                                                         (${app.status.name() == 'OFFERED'} ? 'bg-success' : 'bg-danger')))"
                                          th:text="${app.status}">APPLIED</span>
                                </td>
                                <td class="text-center pe-4">
                                    <!-- ✅ jobId giờ có trong response -->
                                    <a th:href="@{'/jobs/' + ${app.jobId}}" class="btn btn-sm btn-outline-primary">Xem tin đăng</a>
                                </td>
                            </tr>
                        </th:block>

                        <th:block th:if="${applications == null or applications.empty}">
                            <tr>
                                <td colspan="5" class="text-center py-5">
                                    <p class="text-muted mb-3">Bạn chưa ứng tuyển công việc nào.</p>
                                    <a th:href="@{/}" class="btn btn-primary btn-sm px-4">Khám phá việc làm</a>
                                </td>
                            </tr>
                        </th:block>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
