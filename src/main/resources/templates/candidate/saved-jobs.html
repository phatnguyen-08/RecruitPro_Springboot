<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Tin đã lưu - J2PP</title>
</head>
<body>
<div layout:fragment="content" class="py-4">
    <div class="container">
        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="section-title mb-0">
                    <i class="fas fa-bookmark text-warning me-2"></i>Tin tuyển dụng đã lưu
                </h2>
                <p class="text-muted mt-1 mb-0">Danh sách việc làm bạn đã lưu để theo dõi</p>
            </div>
            <a href="/" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-2"></i>Quay lại
            </a>
        </div>

        <!-- Saved Jobs List -->
        <div class="row g-4" id="saved-jobs-container">
            <div class="col-12 text-center py-5">
                <div class="loading-state">
                    <p class="text-muted">Đang tải danh sách...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/application.js}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadSavedJobs();
        });

        async function loadSavedJobs() {
            const container = document.getElementById('saved-jobs-container');

            try {
                const response = await fetchWithAuth('/api/saved-jobs');
                if (!response.ok) throw new Error('Failed to load');

                const savedJobs = await response.json();

                if (savedJobs.length === 0) {
                    container.innerHTML = `
                        <div class="col-12 text-center py-5">
                            <i class="fas fa-bookmark fa-4x text-muted opacity-50 mb-3"></i>
                            <h5 class="text-muted">Chưa có tin nào được lưu</h5>
                            <p class="text-muted">Click vào icon <i class="far fa-bookmark"></i> trên tin tuyển dụng để lưu lại</p>
                            <a href="/" class="btn btn-primary mt-2">
                                <i class="fas fa-search me-2"></i>Tìm việc ngay
                            </a>
                        </div>`;
                    return;
                }

                container.innerHTML = savedJobs.map(job => `
                    <div class="col-md-6 col-lg-4">
                        <div class="card job-card h-100 border-0 shadow-sm">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-start mb-3">
                                    <div class="flex-grow-1">
                                        <h5 class="card-title text-primary fw-bold mb-1">${job.jobTitle}</h5>
                                        <h6 class="card-subtitle text-muted">${job.companyName}</h6>
                                    </div>
                                    <button onclick="unsaveJob(${job.jobId})" class="btn btn-sm btn-outline-warning" title="Bỏ lưu">
                                        <i class="fas fa-bookmark"></i>
                                    </button>
                                </div>
                                <div class="mb-3">
                                    <div class="d-flex align-items-center text-muted mb-2">
                                        <i class="fas fa-map-marker-alt me-2 text-primary"></i>
                                        <small>${job.location || 'Nơi làm việc'}</small>
                                    </div>
                                    <div class="d-flex align-items-center text-muted">
                                        <i class="fas fa-money-bill-wave me-2 text-primary"></i>
                                        <small>${job.salaryRange || 'Thỏa thuận'}</small>
                                    </div>
                                </div>
                                <div class="d-flex gap-2">
                                    <a href="/jobs/${job.jobId}" class="btn btn-outline-primary flex-grow-1">
                                        <i class="fas fa-eye me-2"></i>Chi tiết
                                    </a>
                                    <button onclick="applyForJob(${job.jobId})" class="btn btn-primary flex-grow-1">
                                        <i class="fas fa-paper-plane me-2"></i>Ứng tuyển
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Load saved jobs error:', error);
                container.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <i class="fas fa-exclamation-triangle fa-4x text-danger mb-3"></i>
                        <h5 class="text-danger">Đã xảy ra lỗi</h5>
                        <p class="text-muted">Không thể tải danh sách tin đã lưu</p>
                    </div>`;
            }
        }

        async function unsaveJob(jobId) {
            if (!confirm('Bạn có chắc muốn bỏ lưu tin này?')) return;

            try {
                const response = await fetchWithAuth(`/api/saved-jobs/${jobId}`, { method: 'DELETE' });
                if (response.ok) {
                    showToast('Đã bỏ lưu tin tuyển dụng', 'success');
                    loadSavedJobs();
                } else {
                    showToast('Không thể bỏ lưu tin', 'error');
                }
            } catch (error) {
                console.error('Unsave error:', error);
                showToast('Có lỗi xảy ra', 'error');
            }
        }
    </script>
</th:block>
</body>
</html>
