<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Đăng ký - J2PP</title>
    <link th:href="@{/css/auth.css}" rel="stylesheet">
</head>
<body>
<div layout:fragment="content">
    <div class="auth-page">
        <div class="auth-card card">
            <div class="card-body">
                <div class="auth-header">
                    <div class="auth-icon">
                        <i class="fas fa-user-plus"></i>
                    </div>
                    <h2>Tạo tài khoản mới</h2>
                    <p>Gia nhập J2PP để bắt đầu hành trình sự nghiệp của bạn</p>
                </div>

                <form id="registerForm" class="auth-form">
                    <div id="registerAlert" class="auth-alert alert-danger hidden" role="alert">
                        <i class="fas fa-exclamation-circle"></i>
                        <span id="registerAlertMessage"></span>
                    </div>

                    <div class="form-group">
                        <label for="username" class="form-label">Họ và tên</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control" id="username" required placeholder="Nguyễn Văn A" autocomplete="name">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                            <input type="email" class="form-control" id="email" required placeholder="name@example.com" autocomplete="email">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Mật khẩu</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="password" required placeholder="Tối thiểu 6 ký tự" autocomplete="new-password">
                            <span class="input-group-text password-toggle" onclick="togglePassword()">
                                <i class="fas fa-eye" id="passwordToggleIcon"></i>
                            </span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="role" class="form-label">Bạn là ai?</label>
                        <div class="role-selection">
                            <label class="role-card">
                                <input type="radio" name="role" value="CANDIDATE" checked>
                                <div class="card">
                                    <i class="fas fa-user-graduate"></i>
                                    <h6>Ứng viên</h6>
                                    <small>Tìm việc làm</small>
                                </div>
                            </label>
                            <label class="role-card">
                                <input type="radio" name="role" value="RECRUITER">
                                <div class="card">
                                    <i class="fas fa-building"></i>
                                    <h6>Nhà tuyển dụng</h6>
                                    <small>Đăng tin tuyển dụng</small>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="agreeTerms" required>
                            <label class="form-check-label" for="agreeTerms">
                                Tôi đồng ý với <a href="#" class="text-primary">Điều khoản sử dụng</a> và <a href="#" class="text-primary">Chính sách bảo mật</a>
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-submit" id="registerBtn">
                        <span id="registerBtnText">Tạo tài khoản</span>
                        <span id="registerBtnLoading" class="hidden">
                            <span class="spinner-border spinner-border-sm me-2"></span>
                            Đang xử lý...
                        </span>
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Đã có tài khoản? <a th:href="@{/login}">Đăng nhập ngay</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/auth.js}"></script>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const icon = document.getElementById('passwordToggleIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</th:block>
</body>
</html>
