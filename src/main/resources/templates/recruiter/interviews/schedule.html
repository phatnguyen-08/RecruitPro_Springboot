<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Lịch phỏng vấn</title>
</head>
<body>
<div layout:fragment="content" class="py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">Quản lý lịch phỏng vấn</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#scheduleInterviewModal"><i class="fas fa-calendar-plus me-2"></i>Tạo lịch mới</button>
    </div>

    <div class="row">
        <div class="col-lg-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light">
                                <tr>
                                    <th class="ps-4">Ứng viên</th>
                                    <th>Vị trí</th>
                                    <th>Thời gian</th>
                                    <th>Loại hình</th>
                                    <th>Trạng thái</th>
                                    <th class="text-center pe-4">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <th:block th:if="${interviews != null and !interviews.empty}">
                                    <tr th:each="interview : ${interviews}">
                                        <td class="ps-4">
                                            <h6 class="mb-0 fw-bold" th:text="${interview.candidateName}">Nguyễn Văn B</h6>
                                        </td>
                                        <td th:text="${interview.jobTitle}">Java Developer</td>
                                        <td>
                                            <span class="text-primary fw-bold" th:text="${#temporals.format(interview.dateTime, 'HH:mm dd/MM/yyyy')}">14:00 25/03/2026</span>
                                        </td>
                                        <td>
                                            <span class="badge bg-light text-dark border" th:text="${interview.type}">Online (Zoom)</span>
                                        </td>
                                        <td>
                                            <span class="badge" th:classappend="${interview.status == 'SCHEDULED' ? 'bg-primary' : (interview.status == 'COMPLETED' ? 'bg-success' : 'bg-secondary')}"
                                                  th:text="${interview.status}">Đã lên lịch</span>
                                        </td>
                                        <td class="text-center pe-4">
                                            <div class="btn-group">
                                                <button class="btn btn-sm btn-outline-secondary" title="Gửi lời mời"><i class="fas fa-paper-plane"></i></button>
                                                <button class="btn btn-sm btn-outline-danger" title="Hủy bỏ"><i class="fas fa-trash"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                </th:block>
                                
                                <!-- Empty state -->
                                <th:block th:if="${interviews == null or interviews.empty}">
                                    <tr>
                                        <td colspan="6" class="text-center py-5">
                                            <p class="text-muted">Chưa có lịch phỏng vấn nào được sắp xếp.</p>
                                        </td>
                                    </tr>
                                </th:block>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
