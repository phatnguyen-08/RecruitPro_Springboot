<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/main-layout}">

<head>
    <title>Lịch phỏng vấn</title>
</head>

<body>
    <div layout:fragment="content" class="py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">Quản lý lịch phỏng vấn</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#scheduleInterviewModal">
                <i class="fas fa-calendar-plus me-2"></i>Tạo lịch mới
            </button>
        </div>

        <div class="row">
            <div class="col-lg-12">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="ps-4">Ứng viên</th>
                                        <th>Vị trí</th>
                                        <th>Thời gian</th>
                                        <th>Loại hình</th>
                                        <th>Kết quả</th>
                                        <th class="text-center pe-4">Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody id="interviews-container">
                                    <tr>
                                        <td colspan="6" class="text-center py-5">
                                            <div class="spinner-border text-primary" role="status"></div>
                                            <p class="mt-2 text-muted">Đang tải dữ liệu...</p>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Tạo lịch phỏng vấn -->
    <div class="modal fade" id="scheduleInterviewModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-calendar-plus me-2"></i>Tạo lịch phỏng vấn</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="scheduleInterviewForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Ứng viên (Application ID)</label>
                            <input type="number" id="interviewApplicationId" class="form-control"
                                placeholder="Nhập ID đơn ứng tuyển" required>
                            <small class="text-muted">Xem ID từ danh sách ứng viên trong mục "Ứng viên cho tin"</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Thời gian phỏng vấn</label>
                            <input type="datetime-local" id="interviewDateTime" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Loại hình phỏng vấn</label>
                            <select id="interviewType" class="form-select" required>
                                <option value="ONSITE">Trực tiếp</option>
                                <option value="ONLINE">Online (Zoom/Google Meet)</option>
                                <option value="PHONE">Điện thoại</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Địa điểm / Link</label>
                            <input type="text" id="interviewLocation" class="form-control"
                                placeholder="Địa chỉ hoặc link cuộc họp" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Ghi chú cho ứng viên</label>
                            <textarea id="interviewNote" class="form-control" rows="3"
                                placeholder="Nhập ghi chú..."></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-primary">Tạo lịch</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <th:block layout:fragment="scripts">
        <script th:src="@{/js/application.js}"></script>
    </th:block>
</body>

</html>
