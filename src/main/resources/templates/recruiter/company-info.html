<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/main-layout}">

<head>
    <title>Thông tin công ty</title>
</head>

<body>
    <div layout:fragment="content" class="py-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <h2 class="fw-bold mb-4">Quản lý thông tin công ty</h2>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-5">
                        <form id="companyForm">
                            <!-- ID ẩn của công ty -->
                            <input type="hidden" id="companyId" th:value="${company != null ? company.id : ''}">

                            <div class="row mb-4">
                                <div class="col-md-3 text-center mb-3 mb-md-0">
                                    <img th:src="${company != null and company.logo != null ? company.logo : 'https://via.placeholder.com/150'}"
                                        class="img-thumbnail rounded mb-3" id="company-logo-preview"
                                        style="width: 150px; height: 150px; object-fit: contain;">
                                    <div class="d-grid gap-2">
                                        <button type="button" class="btn btn-outline-primary btn-sm"
                                            onclick="document.getElementById('logo-upload').click()">Tải logo
                                            mới</button>
                                        <input type="file" id="logo-upload" class="hidden" accept="image/*">
                                        <!-- URL Logo ẩn để gửi lên API -->
                                        <input type="hidden" id="logoUrl"
                                            th:value="${company != null ? company.logo : ''}">
                                    </div>
                                </div>
                                <div class="col-md-9">
                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Tên công ty</label>
                                        <input type="text" id="companyName" class="form-control"
                                            th:value="${company != null ? company.name : ''}"
                                            placeholder="Nhập tên công ty" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Website</label>
                                        <input type="url" id="companyWebsite" class="form-control"
                                            th:value="${company != null ? company.website : ''}"
                                            placeholder="https://example.com">
                                    </div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Quy mô công ty</label>
                                <select id="companySize" class="form-select">
                                    <option value="">Chọn quy mô</option>
                                    <option value="1-10"
                                        th:selected="${company != null and company.companySize == '1-10'}">1-10 nhân
                                        viên</option>
                                    <option value="11-50"
                                        th:selected="${company != null and company.companySize == '11-50'}">11-50 nhân
                                        viên</option>
                                    <option value="51-200"
                                        th:selected="${company != null and company.companySize == '51-200'}">51-200 nhân
                                        viên</option>
                                    <option value="201-500"
                                        th:selected="${company != null and company.companySize == '201-500'}">201-500
                                        nhân viên</option>
                                    <option value="500+"
                                        th:selected="${company != null and company.companySize == '500+'}">500+ nhân
                                        viên</option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Ngành nghề</label>
                                <input type="text" id="companyIndustry" class="form-control"
                                    th:value="${company != null ? company.industry : ''}"
                                    placeholder="VD: Công nghệ thông tin, Tài chính,...">
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Mô tả công ty</label>
                                <textarea id="companyDescription" class="form-control" rows="6"
                                    th:text="${company != null ? company.description : ''}"
                                    placeholder="Giới thiệu về tầm nhìn, sứ mệnh, văn hóa công ty..."
                                    required></textarea>
                            </div>

                            <div class="d-flex justify-content-end gap-2">
                                <button type="button" class="btn btn-light px-4"
                                    onclick="location.reload()">Hủy</button>
                                <button type="submit" class="btn btn-primary px-4">Lưu thay đổi</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="scripts">
        <script th:src="@{/js/application.js}"></script>
        <script>
            // Xử lý xem trước Logo khi chọn file
            document.getElementById('logo-upload')?.addEventListener('change', function (e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function (event) {
                        document.getElementById('company-logo-preview').src = event.target.result;
                        // Trong thực tế sẽ upload file lên server/cloud ở đây và lấy URL
                        // Tạm thời gán base64 vào logoUrl để demo nếu DB hỗ trợ text dài
                        document.getElementById('logoUrl').value = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });
        </script>
    </th:block>
</body>

</html>
