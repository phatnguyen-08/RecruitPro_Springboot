<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Quản lý tin đăng - J2PP</title>
</head>
<body>
<div layout:fragment="content" class="py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="section-title mb-0">
            <i class="fas fa-list-alt text-primary me-2"></i>Danh sách tin tuyển dụng
        </h2>
        <a th:href="@{/recruiter/jobs/create}" class="btn btn-primary px-4">
            <i class="fas fa-plus me-2"></i>Đăng tin mới
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4 py-3">Tên công việc</th>
                            <th class="py-3">Ngày đăng</th>
                            <th class="py-3">Lượt ứng tuyển</th>
                            <th class="py-3">Trạng thái</th>
                            <th class="text-center py-3 pe-4">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="my-jobs-container">
                        <!-- Dữ liệu sẽ được nạp bằng JavaScript -->
                        <tr>
                            <td colspan="5" class="text-center py-5">
                                <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;"></div>
                                <p class="text-muted mb-0">Đang tải dữ liệu...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Quick Stats -->
    <div class="row g-4 mt-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm bg-primary bg-opacity-10">
                <div class="card-body d-flex align-items-center">
                    <div class="bg-primary rounded-3 p-3 me-3">
                        <i class="fas fa-briefcase text-white fs-4"></i>
                    </div>
                    <div>
                        <h3 class="mb-0 fw-bold text-primary" id="totalJobs">0</h3>
                        <small class="text-muted">Tin tuyển dụng</small>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm bg-success bg-opacity-10">
                <div class="card-body d-flex align-items-center">
                    <div class="bg-success rounded-3 p-3 me-3">
                        <i class="fas fa-users text-white fs-4"></i>
                    </div>
                    <div>
                        <h3 class="mb-0 fw-bold text-success" id="totalApplications">0</h3>
                        <small class="text-muted">Đơn ứng tuyển</small>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm bg-warning bg-opacity-10">
                <div class="card-body d-flex align-items-center">
                    <div class="bg-warning rounded-3 p-3 me-3">
                        <i class="fas fa-clock text-white fs-4"></i>
                    </div>
                    <div>
                        <h3 class="mb-0 fw-bold text-warning" id="activeJobs">0</h3>
                        <small class="text-muted">Tin đang tuyển</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/application.js}"></script>
    <script>
        // Chạy ngay khi nạp trang
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof loadMyJobs === 'function') {
                loadMyJobs();
            }
        });
    </script>
</th:block>
</body>
</html>
