<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Quản lý tin đăng</title>
</head>
<body>
<div layout:fragment="content" class="py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">Danh sách tin tuyển dụng</h2>
        <a th:href="@{/recruiter/jobs/create}" class="btn btn-primary px-4"><i class="fas fa-plus me-2"></i>Đăng tin mới</a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4">Tên công việc</th>
                            <th>Ngày đăng</th>
                            <th>Lượt ứng tuyển</th>
                            <th>Trạng thái</th>
                            <th class="text-center pe-4">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="my-jobs-container">
                        <!-- Dữ liệu sẽ được nạp bằng JavaScript -->
                        <tr>
                            <td colspan="5" class="text-center py-5">
                                <div class="spinner-border text-primary" role="status"></div>
                                <p class="mt-2 text-muted">Đang tải dữ liệu...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/application.js}"></script>
    <script>
        // Chạy ngay khi nạp trang
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof loadMyJobs === 'function') {
                loadMyJobs();
            }
        });
    </script>
</th:block>
</body>
</html>
