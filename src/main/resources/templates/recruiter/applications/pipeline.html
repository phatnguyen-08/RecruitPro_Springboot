<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Quy trình tuyển dụng</title>
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
</head>
<body>
<div layout:fragment="content" class="py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">Hành trình ứng viên</h2>
        <div class="btn-group">
            <button class="btn btn-outline-primary active">Dạng cột (Pipeline)</button>
            <a th:href="@{/recruiter/applications}" class="btn btn-outline-primary">Dạng danh sách</a>
        </div>
    </div>

    <div class="row g-3 pipeline-container overflow-auto pb-4" style="min-height: 70vh;">
        <!-- New / Pending -->
        <div class="col-md-3">
            <div class="card h-100 border-0 bg-light-subtle shadow-sm">
                <div class="card-header bg-warning text-dark fw-bold border-0">Mới ứng tuyển <span class="badge bg-white text-warning ms-2" th:text="${counts != null ? counts.pending : '0'}">0</span></div>
                <div class="card-body p-2" id="column-pending">
                    <!-- Application Cards -->
                    <div th:each="app : ${pendingApps}" class="card border-0 shadow-sm mb-2 draggable-app" th:attr="data-id=${app.id}">
                        <div class="card-body p-3">
                            <h6 class="fw-bold mb-1" th:text="${app.candidateName}">Nguyễn Văn A</h6>
                            <p class="small text-muted mb-2" th:text="${app.jobTitle}">Java Developer</p>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="small text-muted" th:text="${#temporals.format(app.appliedDate, 'dd/MM')}">20/03</span>
                                <a th:href="@{'/recruiter/applications/' + ${app.id}}" class="btn btn-xs btn-link p-0 text-decoration-none"><i class="fas fa-external-link-alt"></i></a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Reviewing -->
        <div class="col-md-3">
            <div class="card h-100 border-0 bg-light-subtle shadow-sm">
                <div class="card-header bg-info text-white fw-bold border-0">Đang xem xét <span class="badge bg-white text-info ms-2" th:text="${counts != null ? counts.reviewing : '0'}">0</span></div>
                <div class="card-body p-2" id="column-reviewing">
                    <!-- Application Cards -->
                </div>
            </div>
        </div>

        <!-- Interviewing -->
        <div class="col-md-3">
            <div class="card h-100 border-0 bg-light-subtle shadow-sm">
                <div class="card-header bg-primary text-white fw-bold border-0">Phỏng vấn <span class="badge bg-white text-primary ms-2" th:text="${counts != null ? counts.interviewing : '0'}">0</span></div>
                <div class="card-body p-2" id="column-interviewing">
                    <!-- Application Cards -->
                </div>
            </div>
        </div>

        <!-- Final Decision -->
        <div class="col-md-3">
            <div class="card h-100 border-0 bg-light-subtle shadow-sm">
                <div class="card-header bg-success text-white fw-bold border-0">Đã tuyển / Từ chối <span class="badge bg-white text-success ms-2" th:text="${counts != null ? counts.final : '0'}">0</span></div>
                <div class="card-body p-2" id="column-final">
                    <!-- Application Cards -->
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/application.js}"></script>
</th:block>
</body>
</html>
