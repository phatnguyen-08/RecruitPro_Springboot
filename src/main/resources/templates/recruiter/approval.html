<!DOCTYPE html>
<html xmlns:th="http://www.thimeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Xác thực nhà tuyển dụng - RecruitBox</title>
</head>
<body>
<div layout:fragment="content" class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card border-0 shadow-lg">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="fas fa-building fa-4x text-primary mb-3"></i>
                            <h3 class="fw-bold">Xác thực tài khoản nhà tuyển dụng</h3>
                            <p class="text-muted">Vui lòng cung cấp thông tin công ty để quản trị viên phê duyệt</p>
                        </div>

                        <div id="approvalStatusAlert" class="alert alert-info mb-4">
                            <div class="d-flex align-items-center">
                                <i class="fas fa-info-circle fa-2x me-3"></i>
                                <div>
                                    <strong id="statusTitle">Trạng thái:</strong>
                                    <p class="mb-0" id="statusMessage">Đang kiểm tra...</p>
                                </div>
                            </div>
                        </div>

                        <form id="approvalForm">
                            <h5 class="mb-3"><i class="fas fa-building me-2"></i>Thông tin công ty</h5>
                            
                            <div class="mb-3">
                                <label for="companyName" class="form-label">Tên công ty <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="companyName" required placeholder="Công ty ABC">
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="taxCode" class="form-label">Mã số thuế</label>
                                    <input type="text" class="form-control" id="taxCode" placeholder="0123456789">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="companyPhone" class="form-label">Số điện thoại công ty</label>
                                    <input type="text" class="form-control" id="companyPhone" placeholder="0901234567">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="companyAddress" class="form-label">Địa chỉ công ty</label>
                                <input type="text" class="form-control" id="companyAddress" placeholder="123 Nguyễn Huệ, Quận 1, TP.HCM">
                            </div>

                            <div class="mb-3">
                                <label for="companyWebsite" class="form-label">Website công ty</label>
                                <input type="text" class="form-control" id="companyWebsite" placeholder="https://congtyabc.com">
                            </div>

                            <div class="mb-4">
                                <label for="businessLicenseUrl" class="form-label">Link Giấy phép kinh doanh</label>
                                <input type="text" class="form-control" id="businessLicenseUrl" placeholder="Link Google Drive hoặc URL">
                                <small class="text-muted">Vui lòng tải lên Google Drive và dán link tại đây</small>
                            </div>

                            <hr class="my-4">

                            <h5 class="mb-3"><i class="fas fa-user-tie me-2"></i>Thông tin người đại diện</h5>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="contactPersonName" class="form-label">Người đại diện</label>
                                    <input type="text" class="form-control" id="contactPersonName" placeholder="Nguyễn Văn B">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="contactPersonPosition" class="form-label">Chức vụ</label>
                                    <input type="text" class="form-control" id="contactPersonPosition" placeholder="Giám đốc">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="contactPersonPhone" class="form-label">Số điện thoại liên hệ</label>
                                <input type="text" class="form-control" id="contactPersonPhone" placeholder="0901234567">
                            </div>

                            <button type="submit" class="btn btn-primary w-100" id="btnSubmit">
                                <i class="fas fa-paper-plane me-2"></i>Gửi yêu cầu phê duyệt
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <a href="/logout" class="text-muted">
                                <i class="fas fa-sign-out-alt me-1"></i>Đăng xuất
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
<script>
document.addEventListener('DOMContentLoaded', async function() {
    await checkApprovalStatus();

    document.getElementById('approvalForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang gửi...';

        const data = {
            companyName: document.getElementById('companyName').value,
            taxCode: document.getElementById('taxCode').value,
            businessLicenseUrl: document.getElementById('businessLicenseUrl').value,
            companyAddress: document.getElementById('companyAddress').value,
            companyWebsite: document.getElementById('companyWebsite').value,
            companyPhone: document.getElementById('companyPhone').value,
            contactPersonName: document.getElementById('contactPersonName').value,
            contactPersonPosition: document.getElementById('contactPersonPosition').value,
            contactPersonPhone: document.getElementById('contactPersonPhone').value
        };

        try {
            const response = await fetch('/api/recruiter-approval', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('jwt_token')}`
                },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert('Đã gửi yêu cầu phê duyệt! Vui lòng chờ quản trị viên xem xét.');
                await checkApprovalStatus();
            } else {
                const error = await response.json();
                alert('Lỗi: ' + (error.message || 'Không thể gửi yêu cầu'));
            }
        } catch (error) {
            console.error('Submit error:', error);
            alert('Có lỗi xảy ra. Vui lòng thử lại.');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-paper-plane me-2"></i>Gửi yêu cầu phê duyệt';
        }
    });
});

async function checkApprovalStatus() {
    try {
        const response = await fetch('/api/recruiter-approval/status', {
            headers: {
                'Authorization': `Bearer ${localStorage.getItem('jwt_token')}`
            }
        });

        if (!response.ok) {
            window.location.href = '/login';
            return;
        }

        const status = await response.json();
        const alertDiv = document.getElementById('approvalStatusAlert');
        const statusTitle = document.getElementById('statusTitle');
        const statusMessage = document.getElementById('statusMessage');
        const form = document.getElementById('approvalForm');

        if (!status.hasSubmitted) {
            alertDiv.className = 'alert alert-warning mb-4';
            alertDiv.querySelector('i').className = 'fas fa-clock fa-2x me-3 text-warning';
            statusTitle.textContent = 'Chưa gửi yêu cầu:';
            statusMessage.textContent = status.message;
            form.style.display = 'block';
        } else if (status.status === 'PENDING') {
            alertDiv.className = 'alert alert-info mb-4';
            alertDiv.querySelector('i').className = 'fas fa-hourglass-half fa-2x me-3 text-info';
            statusTitle.textContent = 'Đang chờ phê duyệt:';
            statusMessage.textContent = status.message;
            form.style.display = 'none';
        } else if (status.status === 'APPROVED') {
            alertDiv.className = 'alert alert-success mb-4';
            alertDiv.querySelector('i').className = 'fas fa-check-circle fa-2x me-3 text-success';
            statusTitle.textContent = 'Đã phê duyệt:';
            statusMessage.textContent = status.message + ' Bạn có thể sử dụng đầy đủ chức năng.';
            form.style.display = 'none';
            setTimeout(() => {
                window.location.href = '/recruiter/jobs';
            }, 2000);
        } else if (status.status === 'REJECTED') {
            alertDiv.className = 'alert alert-danger mb-4';
            alertDiv.querySelector('i').className = 'fas fa-times-circle fa-2x me-3 text-danger';
            statusTitle.textContent = 'Bị từ chối:';
            statusMessage.textContent = status.message;
            form.style.display = 'none';
        }
    } catch (error) {
        console.error('Check status error:', error);
    }
}
</script>
</th:block>
</body>
</html>
