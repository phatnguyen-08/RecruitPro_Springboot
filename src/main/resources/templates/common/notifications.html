<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/layout/main-layout}">

<head>
    <th:block layout:fragment="styles">
        <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    </th:block>
    <title>Thông báo - J2PP</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="container py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold mb-0">
                    <i class="fas fa-bell me-2 text-primary"></i>Thông báo
                </h2>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-primary btn-sm" onclick="markAllRead()">
                        <i class="fas fa-check-double me-2"></i>Đánh dấu tất cả đã đọc
                    </button>
                </div>
            </div>

            <!-- Notification List -->
            <div class="card shadow-sm border-0" style="border-radius: 16px;">
                <div class="card-body p-0">
                    <div id="notificationList">
                        <div class="text-center py-5" id="loadingNotifications">
                            <div class="spinner-border text-primary" role="status"></div>
                            <p class="mt-2 text-muted">Đang tải thông báo...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="scripts">
    <script>
        let notifications = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadNotifications();
        });

        async function loadNotifications() {
            try {
                const response = await fetch('/api/notifications', {
                    headers: getAuthHeaders()
                });

                if (!response.ok) throw new Error('Failed to load notifications');

                notifications = await response.json();
                renderNotifications();
            } catch (error) {
                console.error('Error loading notifications:', error);
                document.getElementById('notificationList').innerHTML = `
                    <div class="text-center py-5">
                        <i class="fas fa-exclamation-triangle text-warning fa-2x mb-3"></i>
                        <p class="text-muted">Không thể tải thông báo</p>
                    </div>
                `;
            }
        }

        function renderNotifications() {
            const container = document.getElementById('notificationList');

            if (notifications.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-5">
                        <i class="fas fa-bell-slash text-muted fa-2x mb-3"></i>
                        <h5 class="text-muted">Không có thông báo nào</h5>
                        <p class="text-muted small">Các thông báo mới sẽ xuất hiện ở đây</p>
                    </div>
                `;
                return;
            }

            let html = '';
            notifications.forEach(notif => {
                html += `
                    <div class="notification-item ${notif.isRead ? 'read' : 'unread'}" data-id="${notif.id}">
                        <div class="d-flex p-3 border-bottom">
                            <div class="flex-shrink-0 me-3">
                                <div class="avatar-circle d-flex align-items-center justify-content-center"
                                     style="width: 45px; height: 45px; border-radius: 50%; background: ${notif.isRead ? '#e9ecef' : 'var(--gradient-primary)'}; color: ${notif.isRead ? '#6c757d' : 'white'};">
                                    <i class="fas fa-bell"></i>
                                </div>
                            </div>
                            <div class="flex-grow-1">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div>
                                        <h6 class="mb-1 ${notif.isRead ? 'fw-normal' : 'fw-bold'}" style="color: #333;">${notif.title}</h6>
                                        <p class="mb-2 text-muted small">${notif.message}</p>
                                        <small class="text-muted">
                                            <i class="fas fa-clock me-1"></i>${formatDate(notif.createdAt)}
                                        </small>
                                    </div>
                                    <div class="d-flex gap-2">
                                        ${!notif.isRead ? `
                                            <button class="btn btn-sm btn-outline-primary" onclick="markAsRead(${notif.id})" title="Đánh dấu đã đọc">
                                                <i class="fas fa-check"></i>
                                            </button>
                                        ` : ''}
                                        <button class="btn btn-sm btn-outline-danger" onclick="deleteNotification(${notif.id})" title="Xóa thông báo">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        async function markAsRead(id) {
            try {
                const response = await fetch(`/api/notifications/${id}/read`, {
                    method: 'PATCH',
                    headers: getAuthHeaders()
                });

                if (!response.ok) throw new Error('Failed to mark as read');

                const index = notifications.findIndex(n => n.id === id);
                if (index !== -1) {
                    notifications[index].isRead = true;
                }
                renderNotifications();
                showToast('Đã đánh dấu là đã đọc', 'success');
            } catch (error) {
                showToast('Có lỗi xảy ra', 'error');
            }
        }

        async function markAllRead() {
            try {
                const response = await fetch('/api/notifications/read-all', {
                    method: 'PATCH',
                    headers: getAuthHeaders()
                });

                if (!response.ok) throw new Error('Failed to mark all as read');

                notifications.forEach(n => n.isRead = true);
                renderNotifications();
                showToast('Đã đánh dấu tất cả là đã đọc', 'success');
            } catch (error) {
                showToast('Có lỗi xảy ra', 'error');
            }
        }

        async function deleteNotification(id) {
            if (!confirm('Bạn có chắc muốn xóa thông báo này?')) return;

            try {
                const response = await fetch(`/api/notifications/${id}`, {
                    method: 'DELETE',
                    headers: getAuthHeaders()
                });

                if (!response.ok) throw new Error('Failed to delete');

                notifications = notifications.filter(n => n.id !== id);
                renderNotifications();
                showToast('Đã xóa thông báo', 'success');
            } catch (error) {
                showToast('Có lỗi xảy ra', 'error');
            }
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));

            if (days === 0) {
                const hours = Math.floor(diff / (1000 * 60 * 60));
                if (hours === 0) {
                    const minutes = Math.floor(diff / (1000 * 60));
                    return minutes <= 1 ? 'Vừa xong' : `${minutes} phút trước`;
                }
                return hours === 1 ? '1 giờ trước' : `${hours} giờ trước`;
            } else if (days === 1) {
                return 'Hôm qua';
            } else if (days < 7) {
                return `${days} ngày trước`;
            } else {
                return date.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
            }
        }
    </script>
    </th:block>
</body>
</html>
