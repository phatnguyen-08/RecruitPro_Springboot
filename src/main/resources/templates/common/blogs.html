<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Cẩm nang nghề nghiệp - RecruitBox</title>
</head>
<body>
<div layout:fragment="content" class="py-5 bg-light">
    <div class="container">
        <!-- Header -->
        <div class="row mb-5 text-center">
            <div class="col-12">
                <h1 class="display-5 fw-bold text-dark mb-3">Cẩm Nang Nghề Nghiệp</h1>
                <p class="lead text-muted mx-auto" style="max-width: 600px;">Khám phá các bài viết chia sẻ kinh nghiệm phỏng vấn, định hướng nghề nghiệp và kỹ năng làm việc từ các chuyên gia.</p>
            </div>
        </div>

        <!-- Blog Grid -->
        <div class="row g-4">
            <div th:each="blog : ${blogs}" class="col-md-6 col-lg-4">
                <article class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden" style="transition: transform 0.3s ease;">
                    <!-- Image -->
                    <a th:href="@{/blogs/{id}(id=${blog.id})}">
                        <img th:if="${blog.imageUrl != null and !blog.imageUrl.isEmpty()}" th:src="${blog.imageUrl}" class="card-img-top object-fit-cover" alt="Blog image" style="height: 220px;">
                        <div th:unless="${blog.imageUrl != null and !blog.imageUrl.isEmpty()}" class="card-img-top bg-secondary d-flex align-items-center justify-content-center" style="height: 220px;">
                            <i class="fas fa-image fa-3x text-white opacity-50"></i>
                        </div>
                    </a>
                    
                    <!-- Content -->
                    <div class="card-body p-4 d-flex flex-column">
                        <div class="d-flex align-items-center text-muted mb-2 small">
                            <i class="fas fa-calendar-alt me-2"></i>
                            <span th:text="${#temporals.format(blog.createdAt, 'dd/MM/yyyy')}"></span>
                        </div>
                        <h5 class="card-title fw-bold mb-3">
                            <a th:href="@{/blogs/{id}(id=${blog.id})}" class="text-dark text-decoration-none" th:text="${blog.title}"></a>
                        </h5>
                        <p class="card-text text-muted flex-grow-1" th:text="${blog.summary != null ? blog.summary : 'Nhấn vào để đọc trọn vẹn nội dung chi tiết bài viết này...'}"></p>
                        
                        <div class="mt-4 pt-3 border-top d-flex justify-content-between align-items-center">
                            <div class="d-flex align-items-center">
                                <div class="avatar-circle bg-primary text-white me-2" style="width: 32px; height: 32px; font-size: 0.8rem;">
                                    <span th:text="${#strings.substring(blog.authorName, 0, 1).toUpperCase()}"></span>
                                </div>
                                <span class="small fw-medium text-dark" th:text="${blog.authorName}"></span>
                            </div>
                            <a th:href="@{/blogs/{id}(id=${blog.id})}" class="text-primary fw-medium text-decoration-none small">
                                Đọc tiếp <i class="fas fa-arrow-right ms-1"></i>
                            </a>
                        </div>
                    </div>
                </article>
            </div>
            
            <div th:if="${#lists.isEmpty(blogs)}" class="col-12 text-center py-5">
                <i class="fas fa-folder-open text-muted fa-4x mb-3"></i>
                <h3 class="text-muted">Chưa có bài viết nào</h3>
                <p class="text-muted">Tính năng blog đang được cập nhật, vui lòng quay lại sau.</p>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script>
        // Hover effect for cards
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('mouseenter', () => {
                card.style.transform = 'translateY(-5px)';
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'translateY(0)';
            });
        });
    </script>
</th:block>
</body>
</html>
