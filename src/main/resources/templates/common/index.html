<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Trang chủ - Tìm việc làm</title>
</head>
<body>
<div layout:fragment="content">
    <!-- Hero Section -->
    <section class="py-5 text-center bg-light rounded-3 mb-5">
        <div class="row py-lg-5 px-4">
            <div class="col-lg-8 col-md-10 mx-auto">
                <h1 class="fw-bold display-4">Tìm công việc mơ ước của bạn</h1>
                <p class="lead text-muted">Hàng ngàn cơ hội việc làm hấp dẫn đang chờ đón bạn. Hãy bắt đầu hành trình sự nghiệp ngay hôm nay.</p>
                
                <!-- Search Box -->
                <div class="card border-0 shadow-sm mt-4 p-2">
                    <form class="row g-2" id="searchForm">
                        <div class="col-md-5">
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0"><i class="fas fa-search text-muted"></i></span>
                                <input type="text" id="searchTitle" class="form-control border-start-0" placeholder="Tên công việc, kỹ năng...">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0"><i class="fas fa-map-marker-alt text-muted"></i></span>
                                <input type="text" id="searchLocation" class="form-control border-start-0" placeholder="Địa điểm...">
                            </div>
                        </div>
                        <div class="col-md-3 d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Tìm kiếm</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Latest Jobs Section -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold h3">Việc làm mới nhất</h2>
    </div>

    <div class="row g-4 mb-5" id="jobs-list-container">
        <!-- Dữ liệu sẽ được nạp bằng JavaScript -->
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Đang tìm kiếm việc làm tốt nhất cho bạn...</p>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/application.js}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof loadAllJobs === 'function') {
                loadAllJobs();
            }
            
            // Xử lý tìm kiếm
            document.getElementById('searchForm')?.addEventListener('submit', function(e) {
                e.preventDefault();
                const title = document.getElementById('searchTitle').value;
                const location = document.getElementById('searchLocation').value;
                loadAllJobs(title, location);
            });
        });
    </script>
</th:block>
</body>
</html>
